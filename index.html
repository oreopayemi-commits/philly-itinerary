<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philly Itinerary</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f7; color: #1a1a18; min-height: 100vh; padding-bottom: 100px; }
    .wrap { max-width: 600px; margin: 0 auto; padding: 0 16px 60px; }

    .hero { padding: 2.5rem 0 1.5rem; border-bottom: 1px solid #e5e3dc; margin-bottom: 1.5rem; }
    .hero-eyebrow { font-size: 12px; color: #888780; letter-spacing: .08em; text-transform: uppercase; margin-bottom: .4rem; }
    .hero-title { font-size: 28px; font-weight: 600; line-height: 1.2; color: #1a1a18; }
    .hero-sub { font-size: 14px; color: #888780; margin-top: .5rem; }

    .day-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .day-tab { padding: 6px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; color: #666; transition: all .15s; }
    .day-tab.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    .day-tab.extras-tab.active { background: #533AB7; border-color: #533AB7; }

    .stop { display: flex; gap: 12px; }
    .stop-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
    .stop-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #ccc; background: #f9f9f7; flex-shrink: 0; margin-top: 4px; }
    .stop-dot.optional { border-style: dashed; }
    .stop-line { width: 1px; background: #e5e3dc; flex: 1; min-height: 12px; }
    .stop-content { flex: 1; padding-bottom: 20px; }
    .stop-time { font-size: 11px; color: #aaa; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
    .stop-name { font-size: 14px; font-weight: 600; line-height: 1.3; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stop-name .badge { font-size: 10px; font-weight: 400; padding: 1px 6px; border-radius: 20px; background: #eee; color: #888; }
    .map-link { font-size: 11px; color: #185FA5; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
    .map-link:hover { text-decoration: underline; }
    .stop-note { font-size: 12px; color: #666; margin-top: 4px; line-height: 1.5; }

    .extras-grid { display: flex; flex-direction: column; gap: 12px; }
    .extra-card { background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; padding: 14px 16px; }
    .extra-card-name { font-size: 15px; font-weight: 600; color: #1a1a18; margin-bottom: 6px; }
    .extra-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .tag-free { background: #eaf3de; color: #3B6D11; }
    .tag-paid { background: #faeeda; color: #854F0B; }
    .tag-art { background: #EEEDFE; color: #533AB7; }
    .tag-history { background: #faece7; color: #993C1D; }
    .tag-outdoors { background: #e1f5ee; color: #0F6E56; }
    .extra-desc { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 10px; }
    .extra-fit { font-size: 12px; color: #185FA5; background: #e6f1fb; border-radius: 8px; padding: 8px 10px; line-height: 1.5; margin-bottom: 10px; }
    .extra-fit strong { font-weight: 600; }
    .extra-footer { display: flex; align-items: center; justify-content: space-between; }
    .extra-meta { font-size: 11px; color: #aaa; }
    .extra-map-link { font-size: 12px; color: #185FA5; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .extra-map-link:hover { text-decoration: underline; }
    .section-note { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.6; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e5e3dc; }

    .reminders-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e5e3dc; padding: 10px 16px; z-index: 100; }
    .reminders-inner { max-width: 600px; margin: 0 auto; }
    .reminders-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .reminders-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .reminder-chip { font-size: 12px; color: #444; background: #f2f1ed; border-radius: 20px; padding: 4px 10px; line-height: 1.4; }
    .reminder-chip a { color: #185FA5; text-decoration: none; }
    .reminder-chip a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-eyebrow">June 25 – 26, 2025 · Philadelphia</div>
    <div class="hero-title">Philly Itinerary</div>
    <div class="hero-sub">Tap any map link to open in Google Maps · Itinerary by O</div>
  </div>

  <div class="day-tabs">
    <button class="day-tab active" onclick="switchDay(0)">Thu Jun 25 ⚽</button>
    <button class="day-tab" onclick="switchDay(1)">Fri Jun 26 🔔</button>
    <button class="day-tab extras-tab" onclick="switchDay(2)">More to do ✨</button>
  </div>

  <div id="timeline"></div>
  <div id="extras" style="display:none"></div>
</div>

<div class="reminders-bar">
  <div class="reminders-inner">
    <div class="reminders-title">Reminders</div>
    <div class="reminders-list">
      <span class="reminder-chip">🚇 SEPTA Broad St Line — $2.90 each way</span>
      <span class="reminder-chip">🧀 Angelo's — cash only</span>
      <span class="reminder-chip">🔔 Liberty Bell — free, bring ID</span>
      <span class="reminder-chip">🎨 Magic Gardens — <a href="https://www.phillymagicgardens.org/" target="_blank">book tickets in advance</a></span>
    </div>
  </div>
</div>

<script>
const days = [
  {
    stops: [
      { time: '11:00 AM', name: '30th Street Station', note: 'Friends arrive, grab rental car, drive to The Sterling to park 🚗', type: 'logistics', url: 'https://maps.google.com/?cid=12595243436428062015' },
      { time: '11:20 AM', name: 'The Sterling (Home Base)', note: 'Park the car here for the whole weekend. Quick freshen up then head to Penn.', type: 'logistics', url: null },
      { time: '11:45 AM', name: 'Greek Lady', note: 'Lunch while friends decompress from travel. Gyros, big salads, super affordable 🥙', type: 'food', url: 'https://maps.google.com/?cid=9005395951025653586' },
      { time: '1:00 PM', name: 'Locust Walk + Wharton School', note: 'Tour Huntsman Hall and walk down Locust Walk through campus', type: 'explore', url: 'https://maps.google.com/?cid=10129302868525581641' },
      { time: '1:45 PM', name: 'Franklin Field + Penn Museum', note: 'Oldest football stadium in the US right across from the Penn Museum — walk both 🏛️', type: 'explore', url: 'https://maps.google.com/?cid=1157899643571019546', url2: { label: 'Penn Museum', href: 'https://maps.google.com/?cid=3189700885953396518' } },
      { time: '2:30 PM', name: 'Cira Green', note: 'Rooftop park near 30th St with amazing city views 🌿 (pass through Penn Park on the way)', type: 'explore', url: 'https://maps.google.com/?cid=2017761645659983643' },
      { time: '3:00 PM', name: 'City Hall SEPTA Station', note: 'Board Broad Street Line south to NRG Station — $2.90 each way, ~20 min 🚇', type: 'logistics', url: null },
      { time: '3:30 PM', name: 'Lincoln Financial Field', note: 'Curaçao vs. Ivory Coast, 4pm kickoff! World Cup atmosphere ⚽🌍', type: 'event', url: 'https://maps.google.com/?cid=3957482817576677597' },
      { time: '7:00 PM', name: "Pietro's Italian", note: 'Reservation already booked! 🍝', type: 'food', url: 'https://maps.google.com/?cid=10694221054235918221' },
      { time: '8:45 PM', name: 'The Igloo', note: "Walk from Pietro's (~20-25 min) — post-dinner froyo stroll, meet some of Ore's friends. Open til 11pm 🍦", type: 'dessert', url: 'https://maps.google.com/?cid=2973674827365026041' },
    ]
  },
  {
    stops: [
      { time: '9:00 AM', name: 'The Sterling (Meet Up)', note: 'Friends drive here and park. Everything from here is on foot 👟', type: 'logistics', url: null },
      { time: '9:30 AM', name: 'Rocky Steps — Philadelphia Museum of Art', note: 'Run the steps, get the iconic photo. Always free! 🏆📸', type: 'explore', url: 'https://maps.google.com/?cid=14887824939471611718' },
      { time: '10:00 AM', name: 'Boathouse Row', note: 'Beautiful Victorian boathouses on the Schuylkill — 5-10 min walk from Rocky Steps along Kelly Drive 🚣', type: 'explore', url: 'https://maps.google.com/?cid=4972583374919278636' },
      { time: '11:00 AM', name: "Philadelphia's Magic Gardens", note: 'Incredible mosaic art installation on South Street. Book tickets in advance! ~$10-15/person 🎨', type: 'explore', url: 'https://maps.google.com/?cid=7998075498390028587' },
      { time: '12:00 PM', name: "Angelo's Pizzeria", note: "10 min walk from Magic Gardens. Order the cheesesteak (or chicken) — it'll change your life 🧀🥩. Cash only!", type: 'food', url: 'https://maps.google.com/?cid=2799461792011742256' },
      { time: '1:15 PM', name: 'Liberty Bell Center', note: 'Free entry! Bring ID for security 🔔', type: 'explore', url: 'https://maps.google.com/?cid=2282279327381655135' },
      { time: '2:00 PM', name: "Elfreth's Alley", note: "America's oldest residential street. Museum opens at 12pm, only $3 to enter 🏘️", type: 'explore', url: 'https://maps.google.com/?cid=9372751470809636750' },
      { time: '2:45 PM', name: 'Reading Terminal Market', note: "Browse, snack, grab Miller's Twist pretzels 🥨", type: 'food', url: 'https://maps.google.com/?cid=14812286431621114625' },
      { time: '3:30 PM', name: 'Chinatown', note: '2 min walk from Reading Terminal. Bubble tea, walk the arch, browse 🧋', type: 'explore', url: 'https://maps.google.com/?cid=351114119944824147' },
      { time: '4:15 PM', name: 'LOVE Statue — Love Park (JFK Plaza)', note: 'Iconic Philly landmark with the famous LOVE sculpture — quick photo op, central location, right next to City Hall.', type: 'explore', url: null },
      { time: '4:30 PM', name: 'Shopping — Chestnut & Walnut St', note: 'Stroll the strip — Uniqlo, Abercrombie, Old Navy, Urban Outfitters, Nike, New Balance and more 🛍️', type: 'explore', url: null },
      { time: '7:00 PM', name: 'Say goodbyes! 👋', note: 'Adios!', type: 'logistics', url: null },
    ]
  }
];

const extras = [
  {
    name: "Eastern State Penitentiary",
    tags: [{ label: 'History', cls: 'tag-history' }, { label: 'Paid (~$20)', cls: 'tag-paid' }],
    desc: "One of the most hauntingly beautiful places in Philly — a crumbling 1829 prison with an incredible self-guided audio tour. Al Capone was held here. Eerie, photogenic, and genuinely fascinating. Buy tickets online.",
    fit: "Best as a morning swap on Fri — it's a 10 min walk from the Rocky Steps, so you could do Steps → Eastern State → then head downtown. Adds about 1.5–2 hrs to the morning.",
    hours: 'Open Fri 10am–5pm',
    url: 'https://www.google.com/maps/search/?api=1&query=39.9683,-75.1727'
  },
  {
    name: "Penn's Landing / Delaware River Waterfront",
    tags: [{ label: 'Outdoors', cls: 'tag-outdoors' }, { label: 'Free', cls: 'tag-free' }],
    desc: "Chill waterfront stretch along the Delaware River with views of the Ben Franklin Bridge. Good energy in the summer — food trucks, pop-ups, and a great place to decompress. Race Street Pier is especially scenic.",
    fit: "Great evening wind-down after shopping if the group has time before goodbyes. About 15 min walk from the Chestnut/Walnut strip toward the river.",
    hours: 'Always open',
    url: 'https://www.google.com/maps/search/?api=1&query=39.9468,-75.1407'
  },
  {
    name: 'Museum for Art in Wood',
    tags: [{ label: 'Art', cls: 'tag-art' }, { label: 'Free', cls: 'tag-free' }],
    desc: "Tiny but mighty free museum in Old City dedicated entirely to wood sculpture and craft. Only a few rooms but the pieces are genuinely stunning — staff are super knowledgeable.",
    fit: "Fits perfectly after Liberty Bell — it's literally a 3 min walk away on N 3rd St. Takes about 45 min, slot between Liberty Bell and Reading Terminal.",
    hours: 'Open Fri 11:30am–5pm',
    url: 'https://www.google.com/maps/search/?api=1&query=39.9534,-75.1447'
  },
  {
    name: 'Love Park (JFK Plaza)',
    tags: [{ label: 'Outdoors', cls: 'tag-outdoors' }, { label: 'Free', cls: 'tag-free' }],
    desc: "Iconic Philly landmark with the famous LOVE sculpture. Quick photo op, right next to City Hall, and fountains running all summer.",
    fit: "Easy add on the walk back from Chinatown toward the shopping strip — takes 5 min, grab the photo, keep moving.",
    hours: 'Open daily 7am–10pm',
    url: 'https://www.google.com/maps/search/?api=1&query=39.9541,-75.1656'
  }
];

const typeColors = { food: '#B07D10', explore: '#185FA5', logistics: '#3B6D11', event: '#993556', dessert: '#533AB7' };
let activeDay = 0;

function switchDay(d) {
  activeDay = d;
  document.querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === d));
  document.getElementById('timeline').style.display = d < 2 ? '' : 'none';
  document.getElementById('extras').style.display = d === 2 ? '' : 'none';
  if (d < 2) renderTimeline();
  else renderExtras();
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  const stops = days[activeDay].stops;
  tl.innerHTML = stops.map((s, i) => {
    const isLast = i === stops.length - 1;
    const dotClass = `stop-dot${s.optional ? ' optional' : ''}`;
    const mapLinks = [];
    if (s.url) mapLinks.push(`<a class="map-link" href="${s.url}" target="_blank" rel="noopener"><i class="ti ti-map-pin" style="font-size:12px"></i> maps</a>`);
    if (s.url2) mapLinks.push(`<a class="map-link" href="${s.url2.href}" target="_blank" rel="noopener"><i class="ti ti-map-pin" style="font-size:12px"></i> ${s.url2.label}</a>`);
    return `
      <div class="stop">
        <div class="stop-left">
          <div class="${dotClass}" style="border-color:${typeColors[s.type]}"></div>
          ${!isLast ? '<div class="stop-line"></div>' : ''}
        </div>
        <div class="stop-content">
          <div class="stop-time">${s.time}</div>
          <div class="stop-name" style="color:${typeColors[s.type]}">
            ${s.name}
            ${s.optional ? '<span class="badge">optional</span>' : ''}
            ${mapLinks.join('')}
          </div>
          <div class="stop-note">${s.note}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderExtras() {
  const el = document.getElementById('extras');
  el.innerHTML = `
    <div class="section-note">These aren't on the main itinerary but are all worth knowing about — swap something out or squeeze one in if you have time.</div>
    <div class="extras-grid">
      ${extras.map(e => `
        <div class="extra-card">
          <div class="extra-card-name">${e.name}</div>
          <div class="extra-tags">${e.tags.map(t => `<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div>
          <div class="extra-desc">${e.desc}</div>
          <div class="extra-fit"><strong>How it fits:</strong> ${e.fit}</div>
          <div class="extra-footer">
            <span class="extra-meta">${e.hours}</span>
            <a class="extra-map-link" href="${e.url}" target="_blank" rel="noopener"><i class="ti ti-map-pin" style="font-size:13px"></i> open in maps</a>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

renderTimeline();
</script>
</body>
</html>
