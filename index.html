<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philly Itinerary</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f7; color: #1a1a18; min-height: 100vh; }
    .wrap { max-width: 600px; margin: 0 auto; padding: 0 16px 60px; }

    .hero { padding: 2.5rem 0 1.5rem; border-bottom: 1px solid #e5e3dc; margin-bottom: 1.5rem; }
    .hero-eyebrow { font-size: 12px; color: #888780; letter-spacing: .08em; text-transform: uppercase; margin-bottom: .4rem; }
    .hero-title { font-size: 28px; font-weight: 600; line-height: 1.2; color: #1a1a18; }
    .hero-sub { font-size: 14px; color: #888780; margin-top: .5rem; }

    .day-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .day-tab { padding: 6px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; color: #666; transition: all .15s; }
    .day-tab.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    .day-tab.extras-tab.active { background: #533AB7; border-color: #533AB7; }

    /* timeline */
    .stop { display: flex; gap: 12px; }
    .stop-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
    .stop-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #ccc; background: #f9f9f7; flex-shrink: 0; margin-top: 4px; }
    .stop-dot.optional { border-style: dashed; }
    .stop-line { width: 1px; background: #e5e3dc; flex: 1; min-height: 12px; }
    .stop-content { flex: 1; padding-bottom: 20px; }
    .stop-time { font-size: 11px; color: #aaa; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
    .stop-name { font-size: 14px; font-weight: 600; line-height: 1.3; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stop-name .badge { font-size: 10px; font-weight: 400; padding: 1px 6px; border-radius: 20px; background: #eee; color: #888; }
    .map-link { font-size: 11px; color: #185FA5; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
    .map-link:hover { text-decoration: underline; }
    .stop-note { font-size: 12px; color: #666; margin-top: 4px; line-height: 1.5; }

    /* extras page */
    .extras-grid { display: flex; flex-direction: column; gap: 12px; }
    .extra-card { background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; padding: 14px 16px; }
    .extra-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .extra-card-name { font-size: 15px; font-weight: 600; color: #1a1a18; }
    .extra-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .tag-free { background: #eaf3de; color: #3B6D11; }
    .tag-paid { background: #faeeda; color: #854F0B; }
    .tag-food { background: #fef3e2; color: #B07D10; }
    .tag-art { background: #EEEDFE; color: #533AB7; }
    .tag-history { background: #faece7; color: #993C1D; }
    .tag-outdoors { background: #e1f5ee; color: #0F6E56; }
    .extra-desc { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 10px; }
    .extra-fit { font-size: 12px; color: #185FA5; background: #e6f1fb; border-radius: 8px; padding: 8px 10px; line-height: 1.5; margin-bottom: 10px; }
    .extra-fit strong { font-weight: 600; }
    .extra-footer { display: flex; align-items: center; justify-content: space-between; }
    .extra-meta { font-size: 11px; color: #aaa; }
    .extra-map-link { font-size: 12px; color: #185FA5; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .extra-map-link:hover { text-decoration: underline; }

    .section-note { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.6; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e5e3dc; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-eyebrow">June 25 – 26, 2025 · Philadelphia</div>
    <div class="hero-title">Philly Itinerary</div>
    <div class="hero-sub">Tap any map link to open in Google Maps · Itinerary by O</div>
  </div>

  <div class="day-tabs">
    <button class="day-tab active" onclick="switchDay(0)">Thu Jun 25 ⚽</button>
    <button class="day-tab" onclick="switchDay(1)">Fri Jun 26 🔔</button>
    <button class="day-tab extras-tab" onclick="switchDay(2)">More to do ✨</button>
  </div>

  <div id="timeline"></div>
  <div id="extras" style="display:none"></div>
</div>

<script>
const days = [
  {
    stops: [
      { time: '11:00 AM', name: '30th Street Station', note: 'Friends arrive, grab rental car, drive ~5 min to The Sterling to park 🚗', type: 'logistics', lat: 39.9560, lng: -75.1819 },
      { time: '11:20 AM', name: 'The Sterling (Home Base)', note: 'Park the car here for the whole weekend. Quick freshen up then drive to Penn together.', type: 'logistics', lat: 39.9496, lng: -75.1638 },
      { time: '11:45 AM', name: 'Greek Lady', note: 'Lunch first while friends decompress from travel. Gyros, big salads, super affordable 🥙', type: 'food', lat: 39.9534, lng: -75.2030 },
      { time: '1:00 PM', name: 'Locust Walk + Wharton', note: 'Walk Locust Walk east through the heart of campus, end at Huntsman Hall for the Wharton sign pic 📸🌳', type: 'explore', lat: 39.9534, lng: -75.1980 },
      { time: '2:05 PM', name: 'Penn Engineering (SEAS)', note: 'Natural last stop on the way back toward The Sterling 🔬', type: 'explore', lat: 39.9525, lng: -75.1910 },
      { time: '2:35 PM', name: 'Rhodes Field', note: 'Optional Penn soccer facility — skip if running behind ⏱️', type: 'explore', optional: true, lat: 39.9522, lng: -75.1960 },
      { time: '3:00 PM', name: 'City Hall SEPTA Station', note: 'Board Broad Street Line south to NRG Station — $2.90 each way, ~20 min 🚇', type: 'logistics', lat: 39.9523, lng: -75.1638 },
      { time: '3:30 PM', name: 'Lincoln Financial Field', note: 'Curaçao vs. Ivory Coast, 4pm kickoff! World Cup atmosphere ⚽🌍', type: 'event', lat: 39.9008, lng: -75.1675 },
      { time: '7:30 PM', name: "Pietro's Italian", note: 'Reservation already booked! SEPTA back to Center City then walk over 🍝', type: 'food', lat: 39.9500, lng: -75.1700 },
      { time: '9:15 PM', name: 'The Igloo', note: "Walk from Pietro's (~20-25 min) — perfect post-dinner stroll. Open til 11pm 🍦", type: 'dessert', lat: 39.9451, lng: -75.1795 },
    ]
  },
  {
    stops: [
      { time: '9:00 AM', name: 'The Sterling (Meet Up)', note: 'Friends drive back and meet here. Everything from here is on foot 👟', type: 'logistics', lat: 39.9496, lng: -75.1638 },
      { time: '9:30 AM', name: 'Green Eggs Café', note: 'Optional breakfast ~5 min walk. CASH ONLY — bring bills! Closes at 3pm 🍳', type: 'food', optional: true, lat: 39.9482, lng: -75.1624 },
      { time: '9:30 AM', name: 'Rocky Steps — Philadelphia Museum of Art', note: 'First stop! ~15 min walk from The Sterling. Run the steps, get the iconic photo 🏆📸', type: 'explore', lat: 39.9648, lng: -75.1799 },
      { time: '11:00 AM', name: "Angelo's Pizzeria", note: "Arrive right at 11am when they open — line builds fast. They text you when your order's ready 🧀🥩", type: 'food', lat: 39.9407, lng: -75.1577 },
      { time: '12:30 PM', name: 'Liberty Bell Center', note: "Free entry! ~15 min walk from Angelo's. Bring ID for security 🔔", type: 'explore', lat: 39.9502, lng: -75.1502 },
      { time: '1:45 PM', name: 'Reading Terminal Market', note: "10 min walk from Liberty Bell. Browse, snack, Miller's Twist pretzels are a must 🥨", type: 'food', lat: 39.9532, lng: -75.1591 },
      { time: '2:45 PM', name: 'Chinatown', note: 'Walk under the arch, get bubble tea, browse 🧋', type: 'explore', lat: 39.9537, lng: -75.1563 },
      { time: '3:15 PM', name: 'Shopping — Chestnut & Walnut', note: 'Uniqlo, Abercrombie, Old Navy, Urban Outfitters, Anthropologie, thrift stores and more 🛍️', type: 'explore', lat: 39.9514, lng: -75.1675 },
      { time: '5:00 PM', name: 'The Continental Mid-town', note: 'Group dinner for 5 — hanging chairs, rooftop seating, great cocktails 🍸', type: 'food', lat: 39.9519, lng: -75.1705 },
      { time: '7:30 PM', name: '[ORE ONLY] Philadelphia International Airport', note: 'Uber from Continental ~25 min. 9:50pm flight ✈️', type: 'logistics', lat: 39.8744, lng: -75.2424 },
    ]
  }
];

const extras = [
  {
    name: "Philadelphia's Magic Gardens",
    tags: [{ label: 'Art', cls: 'tag-art' }, { label: 'Paid (~$10)', cls: 'tag-paid' }],
    desc: "Isaiah Zagar's epic mosaic wonderland covering an entire block on South Street — covered in tiles, mirrors, bottles, and found objects. One of the most visually wild spots in the city. Book tickets in advance, slots fill up.",
    fit: "Swap for: the Chinatown or shopping stretch on Fri if you want more art. It's about 15 min walk from Angelo's or 10 min from Liberty Bell. Works great as a ~1pm stop after Angelo's instead of going straight to Liberty Bell.",
    hours: 'Open Fri 11am–6pm',
    lat: 39.9426, lng: -75.1594
  },
  {
    name: 'Museum for Art in Wood',
    tags: [{ label: 'Art', cls: 'tag-art' }, { label: 'Free', cls: 'tag-free' }],
    desc: "Tiny but mighty free museum in Old City dedicated entirely to wood sculpture and craft. Only a few rooms but the pieces are genuinely stunning — staff are super knowledgeable and will walk you through everything.",
    fit: "Fits perfectly after Liberty Bell — it's literally a 3 min walk away on N 3rd St. Slot it in between Liberty Bell (12:30pm) and Reading Terminal, takes about 45 min.",
    hours: 'Open Fri 11:30am–5pm',
    lat: 39.9534, lng: -75.1447
  },
  {
    name: 'Eastern State Penitentiary',
    tags: [{ label: 'History', cls: 'tag-history' }, { label: 'Paid (~$20)', cls: 'tag-paid' }],
    desc: "One of the most hauntingly beautiful places in Philly — a crumbling 1829 prison with an incredible self-guided audio tour. Al Capone was held here. Eerie, photogenic, and genuinely fascinating. Buy tickets online.",
    fit: "Best as a morning swap on Fri — it's a 10 min walk from the Rocky Steps, so you could do Steps → Eastern State → then head to Angelo's. Adds about 1.5–2 hrs to the morning.",
    hours: 'Open Fri 10am–5pm',
    lat: 39.9683, lng: -75.1727
  },
  {
    name: "Elfreth's Alley",
    tags: [{ label: 'History', cls: 'tag-history' }, { label: 'Free', cls: 'tag-free' }],
    desc: "The oldest continuously inhabited residential street in the US, dating back to 1702. Just a short cobblestone block but super charming and great for photos. No tickets needed — you just walk through.",
    fit: "Easy add-on after Liberty Bell — it's a 5 min walk into Old City. Takes maybe 15–20 min total. Slot it right between Liberty Bell and Reading Terminal Market without disrupting the flow.",
    hours: 'Always open (outdoor street)',
    lat: 39.9527, lng: -75.1420
  },
  {
    name: "Penn's Landing / Delaware River Waterfront",
    tags: [{ label: 'Outdoors', cls: 'tag-outdoors' }, { label: 'Free', cls: 'tag-free' }],
    desc: "Chill waterfront stretch along the Delaware River with views of the Ben Franklin Bridge. Good energy in the summer — food trucks, pop-ups, and just a nice place to decompress. Race Street Pier is especially scenic.",
    fit: "Great evening wind-down after dinner if the group has energy and doesn't want to go straight to the airport. It's about 10 min walk from Continental — grab the Uber to the airport from here instead.",
    hours: 'Always open',
    lat: 39.9468, lng: -75.1407
  },
  {
    name: 'Love Park (JFK Plaza)',
    tags: [{ label: 'Outdoors', cls: 'tag-outdoors' }, { label: 'Free', cls: 'tag-free' }],
    desc: "Iconic Philly landmark with the famous LOVE sculpture — quick photo op, central location, and right next to City Hall. Fountains running all summer. Classic.",
    fit: "Easiest add on the whole list — it's literally on the walk back from Chinatown toward the shopping strip on Fri. Takes 5 min, grab the photo, keep moving.",
    hours: 'Open daily 7am–10pm',
    lat: 39.9541, lng: -75.1656
  }
];

const typeColors = { food: '#B07D10', explore: '#185FA5', logistics: '#3B6D11', event: '#993556', dessert: '#533AB7' };
let activeDay = 0;

function switchDay(d) {
  activeDay = d;
  document.querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === d));
  document.getElementById('timeline').style.display = d < 2 ? '' : 'none';
  document.getElementById('extras').style.display = d === 2 ? '' : 'none';
  if (d < 2) renderTimeline();
  else renderExtras();
}

function mapsUrl(lat, lng) {
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  const stops = days[activeDay].stops;
  tl.innerHTML = stops.map((s, i) => {
    const isLast = i === stops.length - 1;
    const dotClass = `stop-dot${s.optional ? ' optional' : ''}`;
    return `
      <div class="stop">
        <div class="stop-left">
          <div class="${dotClass}" style="border-color:${typeColors[s.type]}"></div>
          ${!isLast ? '<div class="stop-line"></div>' : ''}
        </div>
        <div class="stop-content">
          <div class="stop-time">${s.time}</div>
          <div class="stop-name" style="color:${typeColors[s.type]}">
            ${s.name}
            ${s.optional ? '<span class="badge">optional</span>' : ''}
            <a class="map-link" href="${mapsUrl(s.lat, s.lng)}" target="_blank" rel="noopener">
              <i class="ti ti-map-pin" style="font-size:12px"></i> maps
            </a>
          </div>
          <div class="stop-note">${s.note}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderExtras() {
  const el = document.getElementById('extras');
  el.innerHTML = `
    <div class="section-note">These aren't on the main itinerary but are all worth knowing about — whether you want to swap something out or squeeze in an extra stop. Notes on how each one fits are included.</div>
    <div class="extras-grid">
      ${extras.map(e => `
        <div class="extra-card">
          <div class="extra-card-header">
            <div class="extra-card-name">${e.name}</div>
          </div>
          <div class="extra-tags">${e.tags.map(t => `<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div>
          <div class="extra-desc">${e.desc}</div>
          <div class="extra-fit"><strong>How it fits:</strong> ${e.fit}</div>
          <div class="extra-footer">
            <span class="extra-meta">${e.hours}</span>
            <a class="extra-map-link" href="${mapsUrl(e.lat, e.lng)}" target="_blank" rel="noopener">
              <i class="ti ti-map-pin" style="font-size:13px"></i> open in maps
            </a>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

renderTimeline();
</script>
</body>
</html>
